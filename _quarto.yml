    # 增加下面这行，让页面宽度不要太宽，阅读体验更好
    # mainfont: "Helvetica Neue, system-ui, sans-serif"
    # --- 在这里加入下面三行 ---
    mainfont: "Arial, sans-serif"  # 强制使用 Arial 字体
    fontsize: 0.9em                # 推荐：0.9em 约等于 14.4px (比较适合阅读)
    linestretch: 1.6               # 行高：字小了，行距要大一点才舒服
